# Keeps the SHA-pinned GitHub Actions and the pinned build dependencies current.
# Without this, pinned versions silently rot and accumulate known-CVE versions,
# which itself becomes a trust/reputation issue over time.
version: 2
updates:
  # GitHub Actions are pinned to commit SHAs (with a # vN comment). Dependabot
  # bumps both the SHA and the comment when a new release ships.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Python build dependencies pinned in requirements-build.txt (Nuitka, etc.).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
