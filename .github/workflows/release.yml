name: Build release binaries

# Builds the single-file launcher for each platform and, when triggered by a
# version tag like v0.1.0, attaches the binaries to the matching GitHub Release.
# Use the manual "Run workflow" button to test-build without publishing.
#
# Both macOS builds run on the fast-scheduling Apple-Silicon runner: the arm64
# one natively, and the Intel (x86_64) one cross-built with a universal2 Python
# running under its x86_64 slice so native Python extensions match the artifact.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: PS2Servers-windows-x64.zip
            folder_asset: PS2Servers-windows-x64-folder.zip
          - os: ubuntu-latest
            asset: PS2Servers-linux-x64
            folder_asset: PS2Servers-linux-x64-folder.tar.gz
          - os: macos-latest
            asset: PS2Servers-macos-arm64.zip
          - os: macos-latest
            asset: PS2Servers-macos-x64.zip
            macos_arch: x86_64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Most jobs use setup-python. The macOS x86_64 cross-build instead needs a
      # universal2 interpreter (with universal Tcl/Tk) and must execute Python as
      # x86_64 so compiled dependencies like lz4 match the Intel artifact.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        if: matrix.macos_arch != 'x86_64'
        with:
          python-version: "3.12"

      - name: Install universal2 Python (macOS x86_64 cross-build)
        if: matrix.macos_arch == 'x86_64'
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license || true
          curl -sSLO https://www.python.org/ftp/python/3.12.7/python-3.12.7-macos11.pkg
          echo "2ec2355c1b3225ce1075fc1b562a6e113017aa6177df87c410667638c1574a09  python-3.12.7-macos11.pkg" | shasum -a 256 -c -
          sudo installer -pkg python-3.12.7-macos11.pkg -target /
          PYBIN=/Library/Frameworks/Python.framework/Versions/3.12/bin
          sudo ln -sf "$PYBIN/python3" "$PYBIN/python"
          echo "$PYBIN" >> "$GITHUB_PATH"
          arch -x86_64 "$PYBIN/python3" -c 'import platform; print(platform.machine())'

      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk-dev

      - name: Install Nuitka
        if: matrix.macos_arch != 'x86_64'
        run: python -m pip install --upgrade pip -r requirements-build.txt

      - name: Install Nuitka (macOS x86_64)
        if: matrix.macos_arch == 'x86_64'
        run: arch -x86_64 python -m pip install --upgrade pip -r requirements-build.txt

      - name: Build bundled libchdr
        if: matrix.macos_arch != 'x86_64'
        env:
          MACOS_TARGET_ARCH: ${{ matrix.macos_arch }}
        run: python build/build_libchdr.py

      - name: Build bundled libchdr (macOS x86_64)
        if: matrix.macos_arch == 'x86_64'
        env:
          MACOS_TARGET_ARCH: ${{ matrix.macos_arch }}
        run: arch -x86_64 python build/build_libchdr.py

      - name: Build single-file binary
        if: matrix.macos_arch != 'x86_64'
        env:
          MACOS_TARGET_ARCH: ${{ matrix.macos_arch }}
        run: python build/build.py

      - name: Build single-file binary (macOS x86_64)
        if: matrix.macos_arch == 'x86_64'
        # Python is already executing as x86_64 here. Do not pass
        # MACOS_TARGET_ARCH to build.py, because that makes Nuitka enter its
        # cross-target path again and can reuse arm64 native extensions.
        run: arch -x86_64 python build/build.py

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          $packageDir = "out/PS2Servers-windows-x64"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item -Path dist/PS2Servers.exe -Destination "$packageDir/PS2Servers.exe" -Force
          Copy-Item -Path ANTIVIRUS-NOTICE.md -Destination $packageDir -Force
          if (Test-Path build/native) {
            Copy-Item -Path build/native -Destination $packageDir -Recurse -Force
          }
          Compress-Archive -Path $packageDir -DestinationPath "out/${{ matrix.asset }}" -Force

      - name: Stage Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p out
          case "$RUNNER_OS" in
            Linux)   cp dist/PS2Servers "out/${{ matrix.asset }}" ;;
            macOS)   app=$(ls -d dist/*.app | head -1)
                     ( cd dist && zip -r -y "../out/${{ matrix.asset }}" "$(basename "$app")" ) ;;
          esac

      - name: Write asset checksum
        shell: python
        run: |
          import hashlib
          from pathlib import Path

          asset = Path("out") / "${{ matrix.asset }}"
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          checksum = asset.with_name(asset.name + ".sha256.txt")
          checksum.write_text(f"{digest}  {asset.name}\n", encoding="utf-8")

      # Additional download for users whose antivirus flags the self-extracting
      # onefile: a plain standalone folder (no extraction bootstrap). Built only
      # for Windows/Linux (macOS already ships a standalone .app).
      - name: Build standalone folder
        if: matrix.folder_asset != ''
        continue-on-error: true
        env:
          PS2_BUILD_MODE: standalone
        run: python build/build.py

      - name: Stage Windows folder artifact
        if: runner.os == 'Windows' && matrix.folder_asset != ''
        continue-on-error: true
        shell: pwsh
        run: |
          $dist = Get-ChildItem dist -Directory -Filter *.dist | Select-Object -First 1
          if (-not $dist) { throw "standalone .dist folder not found in dist/" }
          $packageDir = "out/PS2Servers-windows-x64-folder"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item -Path "$($dist.FullName)/*" -Destination $packageDir -Recurse -Force
          Copy-Item -Path ANTIVIRUS-NOTICE.md -Destination $packageDir -Force
          if (Test-Path build/native) {
            Copy-Item -Path build/native -Destination $packageDir -Recurse -Force
          }
          Compress-Archive -Path $packageDir -DestinationPath "out/${{ matrix.folder_asset }}" -Force

      - name: Stage Linux folder artifact
        if: runner.os == 'Linux' && matrix.folder_asset != ''
        continue-on-error: true
        shell: bash
        run: |
          dist=$(ls -d dist/*.dist 2>/dev/null | head -1)
          test -n "$dist"
          cp ANTIVIRUS-NOTICE.md "$dist/"
          ( cd "$(dirname "$dist")" && tar -czf "$GITHUB_WORKSPACE/out/${{ matrix.folder_asset }}" "$(basename "$dist")" )

      - name: Write folder asset checksum
        if: matrix.folder_asset != ''
        continue-on-error: true
        shell: python
        run: |
          import hashlib
          from pathlib import Path

          asset = Path("out") / "${{ matrix.folder_asset }}"
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          checksum = asset.with_name(asset.name + ".sha256.txt")
          checksum.write_text(f"{digest}  {asset.name}\n", encoding="utf-8")

      - name: Write release notes
        shell: bash
        run: |
          cat > out/release-notes.md <<EOF
          Built from the tagged \`${GITHUB_REF_NAME}\` source so the release tracks \`main\`. Download the correct asset for your OS below.

          ## Downloads

          | OS | Recommended | Also available |
          | --- | --- | --- |
          | Windows x64 | \`PS2Servers-windows-x64-folder.zip\` (folder, AV-clean) | \`PS2Servers-windows-x64.zip\` (single file) |
          | Linux x64 | \`PS2Servers-linux-x64\` | \`PS2Servers-linux-x64-folder.tar.gz\` (folder; use if /tmp is noexec) |
          | macOS — Apple Silicon | \`PS2Servers-macos-arm64.zip\` | |
          | macOS — Intel | \`PS2Servers-macos-x64.zip\` | |

          Run it: **Windows — unzip the folder build and run \`PS2Servers.exe\` from inside the folder.** The single-file \`.exe\` works too but trips some antivirus heuristics; the folder build comes up clean. Linux — \`chmod +x PS2Servers-linux-x64\`, then run. macOS — unzip and right-click → Open (unsigned).

          Compression note: ZSO/LZ4 support is bundled. CHD support is backed by a libchdr native library built from source during release packaging.

          One launcher for all three OPL servers (SMBv1, UDPFS, UDPBD): pick a folder, hit Start. On Windows it runs from the system tray (close/minimize → tray; right-click → Open/Quit).

          ## Security transparency

          PS2 Servers is an open-source PS2 homebrew utility for user-controlled local server setup. It runs local LAN servers for Open PS2 Loader:

          - SMBv1/RiptOPL: built-in SMB/CIFS subset, normally TCP port \`1111\` (below 1033 discouraged).
          - UDPFS: UDP file/block serving, normally UDP port \`0xF5F6\`.
          - UDPBD: UDP block-device serving, normally UDP port \`0xBDBD\`.

          Windows behavior:

          - The Windows SMB server uses PS2 Servers' built-in SMB/CIFS implementation and does not enable Windows SMB1.
          - The app does not enable or disable Windows optional features.
          - Windows Firewall changes happen only after user action/consent and use rules named \`PS2 Servers - ...\`.
          - Advanced SMB port \`445\` mode is optional and requires administrator consent.
          - To uninstall, delete the extracted app folder. To remove PS2 Servers firewall rules, use the GUI action or \`tools/remove-windows-firewall-rules.ps1\`.

          Verification:

          - Release assets include SHA-256 checksum files.
          - For the lowest-trust path, inspect the source and run from source.

          PS2 Servers has been submitted to Avast/Gen Threat Labs for false-positive review.

          The application is open source and built from the public GitHub repository. It is a PS2 homebrew utility for user-controlled local server setup and does not contain malware, credential collection, persistence, adware, browser modification, or crypto-mining behavior.

          Repository:
          https://github.com/NathanNeurotic/PS2-Servers

          ⚠️ Servers pass protocol self-tests; real PS2 / PCSX2 hardware validation still pending.

          🤖 Built by GitHub Actions (Intel macOS cross-built on Apple Silicon).
          EOF

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: out/${{ matrix.asset }}

      - name: Attest folder build provenance
        if: matrix.folder_asset != ''
        continue-on-error: true
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: out/${{ matrix.folder_asset }}

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: |
            out/${{ matrix.asset }}
            out/${{ matrix.asset }}.sha256.txt

      - name: Upload folder build artifact
        if: matrix.folder_asset != ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.folder_asset }}
          path: |
            out/${{ matrix.folder_asset }}
            out/${{ matrix.folder_asset }}.sha256.txt

      # A tag with a '-' qualifier (v0.4.5-rc1, v0.5.0-beta2) is a pre-release:
      # publish it as such and never let it take the "Latest" badge from the
      # current stable tag. A plain vX.Y.Z tag is a normal release and does.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: PS2 Servers ${{ github.ref_name }}
          body_path: out/release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          files: |
            out/${{ matrix.asset }}
            out/${{ matrix.asset }}.sha256.txt

      - name: Attach folder build to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.folder_asset != ''
        continue-on-error: true
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: PS2 Servers ${{ github.ref_name }}
          body_path: out/release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          files: |
            out/${{ matrix.folder_asset }}
            out/${{ matrix.folder_asset }}.sha256.txt
