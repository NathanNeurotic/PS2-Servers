name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Compile Python sources
        run: python -m compileall -q launcher smbv1_server udpbd_server udpfs_server ps2servers.py

      - name: Check release compliance posture
        run: python tools/check_release_compliance.py

      - name: Run UDPBD protocol selftest
        run: python udpbd_server/selftest.py

      - name: Smoke build bundled libchdr
        run: python build/build_libchdr.py
