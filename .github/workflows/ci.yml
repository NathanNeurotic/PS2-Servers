name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Compile Python sources
        run: python -m compileall -q launcher smbv1_server udpbd_server udpfs_server ps2servers.py

      - name: Check release compliance posture
        run: python tools/check_release_compliance.py

      - name: Run UDPBD protocol selftest
        run: python udpbd_server/selftest.py

      - name: Run UDPFS multi-client selftest
        run: python udpfs_server/multiclient_selftest.py

      - name: Run UDPFS compression listing selftest
        run: python udpfs_server/compression_selftest.py

      - name: Smoke build bundled libchdr
        run: python build/build_libchdr.py
