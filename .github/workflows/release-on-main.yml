name: Release on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-on-main
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: PS2Servers-windows-x64.exe
            python_arch: x64
          - os: ubuntu-latest
            asset_name: PS2Servers-linux-x64
            python_arch: x64
          - os: macos-latest
            asset_name: PS2Servers-macos-arm64.zip
            python_arch: arm64
            macos_target_arch: arm64
          - os: macos-latest
            asset_name: PS2Servers-macos-x64.zip
            python_arch: x64
            macos_target_arch: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf python3-tk

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip nuitka ordered-set zstandard

      - name: Build app
        run: python build/build.py
        env:
          MACOS_TARGET_ARCH: ${{ matrix.macos_target_arch }}

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -Path dist/PS2Servers.exe -Destination ${{ matrix.asset_name }} -Force

      - name: Package Linux executable
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cp dist/PS2Servers ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="dist/PS2 Servers.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="$(find dist -maxdepth 1 -name '*.app' -type d | head -n 1)"
          fi
          test -n "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" ${{ matrix.asset_name }}

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release asset artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PS2 Servers ${{ steps.tag.outputs.tag }}
          body: |
            Automatic release from `main`.

            Commit: ${{ github.sha }}
          files: |
            release-assets/PS2Servers-linux-x64
            release-assets/PS2Servers-macos-arm64.zip
            release-assets/PS2Servers-macos-x64.zip
            release-assets/PS2Servers-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
