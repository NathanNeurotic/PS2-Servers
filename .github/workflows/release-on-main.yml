name: Release on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-on-main
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: PS2Servers-windows-x64.zip
            folder_asset: PS2Servers-windows-x64-folder.zip
          # 32-bit Windows, for older / low-end PCs still used for SMB on OPL.
          - os: windows-latest
            asset_name: PS2Servers-windows-x86.zip
            folder_asset: PS2Servers-windows-x86-folder.zip
            win_arch: x86
          - os: ubuntu-latest
            asset_name: PS2Servers-linux-x64
            folder_asset: PS2Servers-linux-x64-folder.tar.gz
          - os: macos-latest
            asset_name: PS2Servers-macos-arm64.zip
          - os: macos-latest
            asset_name: PS2Servers-macos-x64.zip
            macos_arch: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        if: matrix.macos_arch != 'x86_64' && matrix.win_arch != 'x86'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      # 32-bit Windows needs a 32-bit interpreter so Nuitka emits a 32-bit .exe
      # and pip pulls the win32 wheels (lz4, zstandard).
      - name: Set up Python (Windows x86)
        if: matrix.win_arch == 'x86'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          architecture: 'x86'

      - name: Install universal2 Python (macOS x64)
        if: matrix.macos_arch == 'x86_64'
        shell: bash
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license || true
          curl -sSLO https://www.python.org/ftp/python/3.12.7/python-3.12.7-macos11.pkg
          echo "2ec2355c1b3225ce1075fc1b562a6e113017aa6177df87c410667638c1574a09  python-3.12.7-macos11.pkg" | shasum -a 256 -c -
          sudo installer -pkg python-3.12.7-macos11.pkg -target /
          PYBIN=/Library/Frameworks/Python.framework/Versions/3.12/bin
          sudo ln -sf "$PYBIN/python3" "$PYBIN/python"
          echo "$PYBIN" >> "$GITHUB_PATH"
          arch -x86_64 "$PYBIN/python3" -c 'import platform; print(platform.machine())'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf python3-tk

      - name: Install Python build dependencies
        if: matrix.macos_arch != 'x86_64'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Install Python build dependencies (macOS x64)
        if: matrix.macos_arch == 'x86_64'
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 python -m pip install -r requirements-build.txt

      - name: Build bundled libchdr
        if: matrix.macos_arch != 'x86_64'
        env:
          MACOS_TARGET_ARCH: ${{ matrix.macos_arch }}
          WINDOWS_TARGET_ARCH: ${{ matrix.win_arch }}
        run: python build/build_libchdr.py

      - name: Build bundled libchdr (macOS x64)
        if: matrix.macos_arch == 'x86_64'
        env:
          MACOS_TARGET_ARCH: ${{ matrix.macos_arch }}
        run: arch -x86_64 python build/build_libchdr.py

      - name: Build app
        if: matrix.macos_arch != 'x86_64'
        run: python build/build.py
        env:
          MACOS_TARGET_ARCH: ${{ matrix.macos_target_arch }}

      - name: Build app (macOS x64)
        if: matrix.macos_arch == 'x86_64'
        # Python is already executing as x86_64 here. Do not pass
        # MACOS_TARGET_ARCH to build.py, because that makes Nuitka enter its
        # cross-target path and can reuse arm64 native extensions.
        run: arch -x86_64 python build/build.py

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "PS2Servers-windows-x64"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item -Path dist/PS2Servers.exe -Destination "$packageDir/PS2Servers.exe" -Force
          Copy-Item -Path ANTIVIRUS-NOTICE.md -Destination $packageDir -Force
          if (Test-Path build/native) {
            Copy-Item -Path build/native -Destination $packageDir -Recurse -Force
          }
          Compress-Archive -Path $packageDir -DestinationPath ${{ matrix.asset_name }} -Force

      - name: Package Linux executable
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cp dist/PS2Servers ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="dist/PS2 Servers.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="$(find dist -maxdepth 1 -name '*.app' -type d | head -n 1)"
          fi
          test -n "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" ${{ matrix.asset_name }}

      - name: Generate artifact attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ matrix.asset_name }}

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

      # Additional "folder" download for users whose antivirus flags the
      # self-extracting onefile (and for Linux hosts with a noexec /tmp). Same
      # app, no extraction bootstrap. Windows/Linux only; macOS already ships a
      # standalone .app.
      - name: Build standalone folder
        if: matrix.folder_asset != ''
        continue-on-error: true
        env:
          PS2_BUILD_MODE: standalone
        run: python build/build.py

      - name: Package Windows folder build
        if: runner.os == 'Windows' && matrix.folder_asset != ''
        continue-on-error: true
        shell: pwsh
        run: |
          $dist = Get-ChildItem dist -Directory -Filter *.dist | Select-Object -First 1
          if (-not $dist) { throw "standalone .dist folder not found in dist/" }
          $packageDir = "PS2Servers-windows-x64-folder"
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null
          Copy-Item -Path "$($dist.FullName)/*" -Destination $packageDir -Recurse -Force
          Copy-Item -Path ANTIVIRUS-NOTICE.md -Destination $packageDir -Force
          if (Test-Path build/native) {
            Copy-Item -Path build/native -Destination $packageDir -Recurse -Force
          }
          Compress-Archive -Path $packageDir -DestinationPath ${{ matrix.folder_asset }} -Force

      - name: Package Linux folder build
        if: runner.os == 'Linux' && matrix.folder_asset != ''
        continue-on-error: true
        shell: bash
        run: |
          dist=$(ls -d dist/*.dist 2>/dev/null | head -1)
          test -n "$dist"
          cp ANTIVIRUS-NOTICE.md "$dist/"
          ( cd "$(dirname "$dist")" && tar -czf "$GITHUB_WORKSPACE/${{ matrix.folder_asset }}" "$(basename "$dist")" )

      - name: Generate folder artifact attestation
        if: matrix.folder_asset != ''
        continue-on-error: true
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ matrix.folder_asset }}

      - name: Upload folder release asset artifact
        if: matrix.folder_asset != ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.folder_asset }}
          path: ${{ matrix.folder_asset }}
          if-no-files-found: error

  source:
    name: Package source archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create portable source zip
        shell: bash
        run: |
          git archive --format=zip --output=PS2Servers-source.zip HEAD

      - name: Generate source attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: PS2Servers-source.zip

      - name: Upload source artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PS2Servers-source.zip
          path: PS2Servers-source.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - build
      - source
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download release asset artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-assets
          # Required onefile/source assets plus the optional standalone-folder
          # builds. Sum only the ones present so a missing optional folder asset
          # never blocks the release of the primary downloads.
          assets=(
            PS2Servers-linux-x64
            PS2Servers-linux-x64-folder.tar.gz
            PS2Servers-macos-arm64.zip
            PS2Servers-macos-x64.zip
            PS2Servers-source.zip
            PS2Servers-windows-x64.zip
            PS2Servers-windows-x64-folder.zip
            PS2Servers-windows-x86.zip
            PS2Servers-windows-x86-folder.zip
          )
          present=()
          for a in "${assets[@]}"; do
            [ -f "$a" ] && present+=("$a")
          done
          sha256sum "${present[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PS2 Servers ${{ steps.tag.outputs.tag }}
          # Rolling dev builds must never outrank tagged releases: publish as
          # pre-release so GitHub's "Latest" badge always stays on the newest
          # tagged vX.Y.Z release (a same-day merge repeatedly stole it).
          prerelease: true
          make_latest: false
          body: |
            Automatic development build from `main`, published as a
            **pre-release**. For stable downloads use the
            [latest tagged release](https://github.com/NathanNeurotic/PS2-Servers/releases/latest).

            Commit: ${{ github.sha }}

            ## Downloads

            **On Windows, download the folder build** (`PS2Servers-windows-x64-folder.zip`)
            and run `PS2Servers.exe` from inside the folder — it is the same app
            without the self-extracting wrapper that trips antivirus heuristics, so
            it comes up clean. A single-file `PS2Servers-windows-x64.zip` is also
            published for convenience. **32-bit Windows** builds
            (`PS2Servers-windows-x86*.zip`) are published for older / low-end PCs.
            Linux: `PS2Servers-linux-x64` (or the `-folder.tar.gz` build if `/tmp`
            is `noexec`). macOS ships as a `.app`.

            ## Security transparency

            PS2 Servers is an open-source PS2 homebrew utility for user-controlled local server setup. It runs local LAN servers for Open PS2 Loader:

            - SMBv1/RiptOPL: built-in SMB/CIFS subset, normally TCP port `1111` (below 1033 discouraged).
            - UDPFS: UDP file/block serving, normally UDP port `0xF5F6`.
            - UDPBD: UDP block-device serving, normally UDP port `0xBDBD`.

            Windows behavior:

            - The Windows SMB server uses PS2 Servers' built-in SMB/CIFS implementation and does not enable Windows SMB1.
            - The app does not enable or disable Windows optional features.
            - Windows Firewall changes happen only after user action/consent and use rules named `PS2 Servers - ...`.
            - Advanced SMB port `445` mode is optional and requires administrator consent.
            - To uninstall, delete the extracted app folder. To remove PS2 Servers firewall rules, use the GUI action or `tools/remove-windows-firewall-rules.ps1`.

            Verification:

            - Release assets include `SHA256SUMS.txt`.
            - GitHub artifact attestations are generated for binary and source artifacts.
            - For the lowest-trust path, use `PS2Servers-source.zip` and run from source.

            PS2 Servers has been submitted to Avast/Gen Threat Labs for false-positive review.

            The application is open source and built from the public GitHub repository. It is a PS2 homebrew utility for user-controlled local server setup and does not contain malware, credential collection, persistence, adware, browser modification, or crypto-mining behavior.

            Repository:
            https://github.com/NathanNeurotic/PS2-Servers
          files: |
            release-assets/PS2Servers-linux-x64
            release-assets/PS2Servers-linux-x64-folder.tar.gz
            release-assets/PS2Servers-macos-arm64.zip
            release-assets/PS2Servers-macos-x64.zip
            release-assets/PS2Servers-source.zip
            release-assets/PS2Servers-windows-x64.zip
            release-assets/PS2Servers-windows-x64-folder.zip
            release-assets/PS2Servers-windows-x86.zip
            release-assets/PS2Servers-windows-x86-folder.zip
            release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure the dev build stays a pre-release
        # softprops sets prerelease: true above, but GitHub has silently dropped
        # that flag on publish (main-96, during an API hiccup), which let a dev
        # build steal the "Latest" badge from the newest tagged vX.Y.Z. Re-assert
        # it -- idempotent when already set -- so a mis-flag cannot reach users.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set +e
          # A pre-release is never the "Latest" release, so this alone keeps the
          # badge on the newest tagged vX.Y.Z. Retry once, then VERIFY -- GitHub
          # has accepted this call without applying the flag before. If the build
          # is still mis-flagged it would steal Latest right now, so fail loudly
          # (the release is already published; a red run flags it for a human,
          # and the prune keys on the tag so it is still cleaned up next run).
          for attempt in 1 2; do
            gh release edit "$TAG" --prerelease && break
            echo "attempt ${attempt}: could not set --prerelease on ${TAG}"
            sleep 5
          done
          pre=$(gh release view "$TAG" --json isPrerelease --jq .isPrerelease 2>/dev/null)
          if [ "$pre" = "true" ]; then
            echo "confirmed ${TAG} is a pre-release"
            exit 0
          fi
          echo "::error::${TAG} is not flagged pre-release; it could steal the Latest badge"
          exit 1

      - name: Prune old development pre-releases
        # Every push to main publishes one of these, and nothing used to remove
        # them: they reached 49 releases / 83 tags before a manual cleanup. Keep
        # only the newest few so the Releases page stays readable.
        #
        # Selection keys on the main-<run>-<sha> TAG pattern alone, NOT on the
        # prerelease flag. A tagged vX.Y.Z can never match that pattern, and the
        # loop refuses anything starting with "v" as a last line of defence, so
        # a real release is never at risk. Matching the tag (not the flag) also
        # makes this self-healing: GitHub once published main-96 with
        # prerelease=false (an API hiccup), which both stole the "Latest" badge
        # from the newest vX.Y.Z AND made that build immune to a flag-based
        # prune. Keying on the tag prunes such a mis-flagged build too.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: '5'
        shell: bash
        run: |
          # Cleanup must never fail a release that already published fine.
          set +e
          # Newest first. Selection is done here; "how many to keep" is applied
          # with tail below rather than inside jq, so the slice stays trivial to
          # reason about and needs no jq binary (gh has jq built in).
          # Match the EXACT generated shape main-<run>-<7-hex-sha>, not just the
          # prefix, so a hand-made tag like main-123-hotfix is never selected.
          gh release list --limit 200 --json tagName,isPrerelease,createdAt \
            --jq '[ .[]
                    | select(.tagName | test("^main-[0-9]+-[0-9a-f]{7}$"))
                  ]
                  | sort_by(.createdAt) | reverse | .[].tagName' > all_dev.txt || exit 0
          total=$(grep -c . all_dev.txt)
          # Skip the newest KEEP lines; everything after them is stale.
          tail -n +"$((KEEP + 1))" all_dev.txt > stale.txt
          count=$(grep -c . stale.txt)
          echo "Dev builds (main-*): ${total}. Keeping newest ${KEEP}, pruning ${count}."
          while read -r tag; do
            [ -z "$tag" ] && continue
            case "$tag" in
              v*) echo "REFUSING to touch version release ${tag}"; continue ;;
            esac
            echo "  deleting ${tag}"
            gh release delete "$tag" --cleanup-tag --yes \
              || echo "  (could not delete ${tag}; leaving it)"
          done < stale.txt
          exit 0
